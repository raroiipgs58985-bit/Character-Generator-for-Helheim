<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helheim Character Generator</title>
<style>
body{margin:0;background:#101114;color:#e8e8e8;font-family:system-ui;padding:14px}
.wrap{max-width:1100px;margin:auto}.grid{display:grid;gap:12px}@media(min-width:900px){.grid{grid-template-columns:420px 1fr}}
.card{background:#181a20;border:1px solid #343844;border-radius:12px;padding:12px}
h1{font-size:22px}h2{font-size:18px;color:#d7a17a}
label{display:block;margin:10px 0 5px;color:#aaa;font-size:14px}
input,select,textarea,button{width:100%;border-radius:8px;border:1px solid #343844;background:#20232b;color:#e8e8e8;padding:9px;font-size:15px}
button{background:#d7a17a;color:#160d08;font-weight:700;border:none;margin-top:10px}.secondary{background:#20232b;color:#e8e8e8;border:1px solid #343844}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:#111319;border:1px solid #343844;border-radius:10px;padding:7px}
.stat-title{font-size:13px;color:#aaa;margin-bottom:5px}
.stat-value{text-align:center;font-size:20px;font-weight:700;margin:5px 0}
.stat-buttons{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.stat-buttons button{margin:0;padding:5px}
.small{color:#aaa;font-size:13px;line-height:1.35}.ok{color:#8cff9b;font-weight:700}.bad{color:#ff7777;font-weight:700}
pre{white-space:pre-wrap;word-wrap:break-word;background:#0b0c0f;border:1px solid #343844;border-radius:12px;padding:12px;min-height:420px;font-size:14px;line-height:1.4}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="wrap">
<h1>Helheim Character Generator</h1>
<div class="grid">
<div class="card">
<h2>Создание персонажа</h2>

<label>Имя</label>
<input id="charName" placeholder="Имя персонажа">

<label>Раса / шаблон</label>
<select id="templateSelect"></select>

<div class="row">
<div>
<label>Распределение</label>
<select id="statMode">
<option value="planned">Плановое</option>
<option value="random">Случайное 2к10</option>
</select>
</div>
<div>
<label>ОБ вручную</label>
<input id="armor" value="0/0/0/0">
</div>
</div>

<button onclick="prepareStats()">Подготовить характеристики</button>
<p id="pointsInfo" class="small"></p>
<div id="statsBox" class="stats"></div>

<h3>Покупка характеристик</h3>
<p id="upgradeInfo" class="small"></p>
<div id="upgradeStatsBox" class="stats"></div>

 <h3>Покупка навыков</h3>
<div class="row">
  <select id="skillsBuySelect" onchange="updateSkillSpecSelect()"></select>
  <select id="skillSpecSelect"></select>
  <button onclick="buySkills()">Купить / улучшить навык</button>
</div>

<h3>Покупка талантов</h3>
<div class="row">
  <select id="talentsBuySelect" onchange="updateTalentVariantSelect()"></select>
  <select id="talentVariantSelect"></select>
  <button onclick="buyTalent()">Купить талант</button>
</div>
 
<label>Родной мир / природа Искина</label>
<select id="originSelect"></select>

<label>Специальность</label>
<select id="specialtySelect"></select>

<div class="row">
<div><label>Очки безумия</label><input id="madness" value="0"></div>
<div><label>Очки судьбы</label><input id="fate" value="0"></div>
</div>

<label>Импланты</label>
<textarea id="implants" rows="2" placeholder="Через ;"></textarea>

<label>Снаряжение вручную</label>
<textarea id="manualEquipment" rows="3" placeholder="Через ;"></textarea>

<label>Примечание</label>
<textarea id="notes" rows="2"></textarea>

<button onclick="generate()">Сгенерировать карточку</button>
<button class="secondary" onclick="downloadCard()">Скачать карточку txt</button>
 <button class="secondary" onclick="downloadExcelStyled()">Скачать карточку Excel</button>
<p id="status" class="small"></p>
</div>

<div class="card">
<h2>Итоговая карточка</h2>
<pre id="output">Загрузка базы...</pre>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script>
const MAIN_STATS=["НС","НР","СЛ","ВН","ЛВ","ИН","СВ","ВС","ОЩ"];
const BONUS_NAMES={НС:"БНС",НР:"БНР",СЛ:"БСЛ",ВН:"БВН",ЛВ:"БЛВ",ИН:"БИН",СВ:"БСВ",ВС:"БВС",ОЩ:"БОЩ"};

const DB_FILES={
 templates:"data/templates.txt",
 homeworlds:"data/homeworlds.txt",
 aiNatures:"data/ai_natures.txt",
 talents:"data/talents.txt",
 skills:"data/skills.txt",
 soldiers:"data/specialties_soldiers.txt",
 officerSupport:"data/specialties_officer_support.txt",
 civilian:"data/specialties_civilian.txt"
};

let DB={};
let baseStats={};
let statAdds={};
let finalStats={};
let currentPoints=100;
let currentMaxAdd=20;

function joinSemi(a,b){return a?a+"; "+b:b}
function intv(v,d=0){let m=String(v??"").match(/-?\d+/);return m?parseInt(m[0],10):d}
function splitList(t){return t?t.split(";").map(x=>x.trim()).filter(Boolean):[]}

function parseBlocks(text){
 let blocks={},current=null,currentKey=null;
 for(let raw of text.split(/\r?\n/)){
  let line=raw.trim();
  if(!line||line.startsWith("#"))continue;
  if(line.startsWith("[")&&line.endsWith("]")){
   current=line.slice(1,-1).trim();
   blocks[current]={};
   currentKey=null;
   continue;
  }
  if(!current)continue;
  if(line.endsWith(":")){
   currentKey=line.slice(0,-1).trim();
   blocks[current][currentKey]="";
   continue;
  }
  if(line.startsWith("-")&&currentKey){
   blocks[current][currentKey]=joinSemi(blocks[current][currentKey],line.slice(1).trim());
   continue;
  }
  if(line.includes("=")){
   let i=line.indexOf("="),key=line.slice(0,i).trim(),value=line.slice(i+1).trim();
   if(currentKey&&MAIN_STATS.includes(key)){
    blocks[current][currentKey]=joinSemi(blocks[current][currentKey],key+"="+value);
   }else{
    blocks[current][key]=value;
    currentKey=null;
   }
  }
 }
 return blocks;
}

async function loadText(path){
 let r=await fetch(path);
 if(!r.ok)throw new Error("Не удалось загрузить "+path);
 return await r.text();
}

async function loadDB(){
  try{
    for(const [k,p] of Object.entries(DB_FILES)){
      out("Загружаю файл: " + p);
      DB[k]=parseBlocks(await loadText(p));
    }

    out("Файлы загружены. Собираю базу...");

    DB.specialties={...DB.soldiers,...DB.officerSupport,...DB.civilian};
    fillSelect("templateSelect",Object.keys(DB.templates));
    fillSelect("specialtySelect",Object.keys(DB.specialties));
   fillSelect("skillsBuySelect",Object.keys(DB.skills));
   fillSelect("talentsBuySelect",Object.keys(DB.talents));
   updateTalentVariantSelect();
   updateSkillSpecSelect();
    updateOrigins();
    prepareStats();

    out("База загружена. Выбери параметры и нажми «Сгенерировать карточку».");
  }catch(e){
    out("ОШИБКА ЗАГРУЗКИ БАЗЫ:\n" + e.message);
  }
}

 function updateSkillSpecSelect(){
    let skill = document.getElementById("skillsBuySelect").value;
    let spec = document.getElementById("skillSpecSelect");

    spec.innerHTML = "";

    let data = DB.skills[skill] || {};
    let variants = splitList(data.variants || "");

    if(!variants.length){
        let o=document.createElement("option");
        o.value="";
        o.textContent="Без специализации";
        spec.appendChild(o);
        return;
    }

    for(const v of variants){
        let o=document.createElement("option");
        o.value=v;
        o.textContent=v;
        spec.appendChild(o);
    }
 }

 function updateTalentVariantSelect(){

    let talent = document.getElementById("talentsBuySelect").value;
    let select = document.getElementById("talentVariantSelect");

    select.innerHTML = "";

    let data = DB.talents[talent] || {};
    let variants = splitList(data.variants || "");

    let o = document.createElement("option");
    o.value = "";
    o.textContent = "Без специализации";
    select.appendChild(o);

    for(let v of variants){
        let opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        select.appendChild(opt);
    }
 }

function fillSelect(id,names){
 let s=document.getElementById(id);
 if(!s){
  throw new Error("Не найден select с id: "+id);
 }
 s.innerHTML="";
 for(const n of (names||[])){
  let o=document.createElement("option");
  o.value=n;
  o.textContent=n;
  s.appendChild(o);
 }
}

function parseBaseStats(b){
 let st={};
 for(const s of MAIN_STATS)st[s]=0;
 if(b.base_stats){
  for(const p of splitList(b.base_stats)){
   let m=p.match(/^(НС|НР|СЛ|ВН|ЛВ|ИН|СВ|ВС|ОЩ)\s*=?\s*(-?\d+)/);
   if(m)st[m[1]]=parseInt(m[2],10);
  }
 }
 for(const s of MAIN_STATS){
  if(b[s]!==undefined)st[s]=intv(b[s],0);
 }
 return st;
}

function parseMods(t){
 let m={};
 for(const s of MAIN_STATS)m[s]=0;
 for(const p of splitList(t)){
  let r=p.match(/^(НС|НР|СЛ|ВН|ЛВ|ИН|СВ|ВС|ОЩ)\s*([+-]?\d+)/);
  if(r)m[r[1]]+=parseInt(r[2],10);
 }
 return m;
}

function updateOrigins(){
 let n=document.getElementById("templateSelect").value;
 let t=DB.templates[n]||{};
 let syn=(t.type||"").toLowerCase()=="synthetic"||n.toLowerCase()=="искин";
 fillSelect("originSelect",Object.keys(syn?DB.aiNatures:DB.homeworlds));
}

document.getElementById("templateSelect").addEventListener("change",()=>{updateOrigins();prepareStats()});
document.getElementById("statMode").addEventListener("change",prepareStats);

function roll2d10(){
 return 1+Math.floor(Math.random()*10)+1+Math.floor(Math.random()*10);
}

function prepareStats(){
 let n=document.getElementById("templateSelect").value;
 let t=DB.templates[n]||{};
 let mode=document.getElementById("statMode").value;

 baseStats=parseBaseStats(t);
 currentPoints=intv(t.stat_points_planned,100);
 currentMaxAdd=intv(t.stat_max_add,20);
 statAdds={};
 finalStats={};

 for(const s of MAIN_STATS){
  statAdds[s]=0;
  finalStats[s]=baseStats[s]||0;
 }

 if(mode==="random"){
  for(const s of MAIN_STATS){
   finalStats[s]=(baseStats[s]||0)+roll2d10();
  }
 }

 renderStats();
}

function spentPoints(){
 let sum=0;
 for(const s of MAIN_STATS)sum+=statAdds[s]||0;
 return sum;
}

function renderStats(){
 const mode=document.getElementById("statMode").value;
 const spent=spentPoints();
 const left=currentPoints-spent;
 const info=document.getElementById("pointsInfo");

 if(mode==="planned"){
  info.innerHTML=`Доступно очков: ${currentPoints}. Осталось: <b>${left}</b>. Максимум в одну характеристику: ${currentMaxAdd}.`;
 }else{
  info.textContent="Случайный режим: к базе добавлено 2к10. Ручное изменение отключено.";
 }

 let box=document.getElementById("statsBox");
 box.innerHTML="";

 for(const s of MAIN_STATS){
  let canEdit=mode==="planned";
  let d=document.createElement("div");
  d.className="stat";

  d.innerHTML=`
   <div class="stat-title">${s} база ${baseStats[s]||0} ${canEdit?`(+${statAdds[s]||0})`:""}</div>
   <div class="stat-value" id="val_${s}">${finalStats[s]||0}</div>
   ${canEdit?`
   <div class="stat-buttons">
    <button type="button" onclick="changeStat('${s}',-1)">−</button>
    <button type="button" onclick="changeStat('${s}',1)">+</button>
   </div>`:""}
  `;
  box.appendChild(d);
 }
}

function renderUpgradeStats(){

    if(!window.currentCharacter) return;

    let c = window.currentCharacter;
    let box = document.getElementById("upgradeStatsBox");
    let info = document.getElementById("upgradeInfo");

    if(!box || !info) return;

    let left = c.startingXp + c.xpRefund - c.spentXp;

    info.innerHTML = `Осталось опыта: ${left}`;

    box.innerHTML = "";

    for(const s of MAIN_STATS){

        let count = c.statUpgrades[s] || 0;

        let d = document.createElement("div");
        d.className = "stat";

        d.innerHTML = `
            <div class="stat-title">${s}</div>
            <div class="stat-title">Куплено: ${count * 5}</div>
            <div class="stat-value">${c.stats[s]}</div>
            <div class="stat-buttons">
                <button type="button" onclick="refundStatUpgrade('${s}')">-</button>
                <button type="button" onclick="buyStatUpgrade('${s}')">+</button>
            </div>
        `;

        box.appendChild(d);
    }
}
 
function changeStat(stat,delta){
 if(delta>0){
  if(spentPoints()>=currentPoints){
   alert("Все очки уже распределены.");
   return;
  }
  if((statAdds[stat]||0)>=currentMaxAdd){
   alert(`В ${stat} нельзя вложить больше ${currentMaxAdd} очков.`);
   return;
  }
  statAdds[stat]=(statAdds[stat]||0)+1;
  finalStats[stat]=(finalStats[stat]||0)+1;
 }else{
  if((statAdds[stat]||0)<=0)return;
  statAdds[stat]-=1;
  finalStats[stat]-=1;
 }
 renderStats();
}
function buyStatUpgrade(stat){
  if(!window.currentCharacter){
    alert("Сначала сгенерируй карточку.");
    return;
  }

  let c = window.currentCharacter;

  if(!c.statUpgrades[stat]) c.statUpgrades[stat]=0;

  let count = c.statUpgrades[stat];

  let cost = 0;

  if(count===0) cost=250;
  else if(count===1) cost=500;
  else if(count===2) cost=750;
  else cost=1000;
 let availableXp = c.startingXp + c.xpRefund - c.spentXp;
if(availableXp < cost){
  alert(`Не хватает опыта. Нужно ${cost}, доступно ${availableXp}.`);
  return;
}
  c.stats[stat] += 5;
  c.statUpgrades[stat] += 1;
  c.spentXp += cost;

  out(card(c));
renderUpgradeStats();
}

 function refundStatUpgrade(stat){

    if(!window.currentCharacter){
        alert("Сначала сгенерируй карточку.");
        return;
    }

    let c = window.currentCharacter;

    if(!c.statUpgrades || !c.statUpgrades[stat]){
        alert("Эта характеристика ещё не улучшалась.");
        return;
    }

    let count = c.statUpgrades[stat];

    let cost = 250;
    if(count === 2) cost = 500;
    else if(count === 3) cost = 750;
    else if(count >= 4) cost = 1000;

    c.stats[stat] -= 5;
    c.statUpgrades[stat] -= 1;
    c.spentXp -= cost;

    out(card(c));
    renderUpgradeStats();
 }

 function buySkills(){
    if(!window.currentCharacter){
        alert("Сначала сгенерируй карточку.");
        return;
    }

    let c = window.currentCharacter;
    let skill = document.getElementById("skillsBuySelect").value;
  let spec = document.getElementById("skillSpecSelect").value;

if(spec){
    skill = `${skill.trim()} (${spec.trim()})`;
}
    let current = c.skills[skill] || 0;

    let cost = 0;

    if(!(skill in c.skills)) cost = 200;
else if(current < 10) cost = 350;
else if(current < 20) cost = 500;
else if(current < 30) cost = 750;
else {
    alert("Навык уже достиг предела +30.");
    return;
}

    let availableXp = c.startingXp + c.xpRefund - c.spentXp;

    if(availableXp < cost){
        alert(`Не хватает опыта. Нужно ${cost}, доступно ${availableXp}.`);
        return;
    }

    if(!(skill in c.skills)){
    c.skills[skill] = 0;
}else{
    c.skills[skill] += 10;
}

c.spentXp += cost;

    out(card(c));
 }

 function checkTalentRequirements(req, c){

    if(!req || req.trim() === "-" || req.trim() === "--"){
        return true;
    }

    const STAT_ALIASES = {
        "НАВЫК СТРЕЛЬБЫ":"НС",
        "РУКОПАШНЫЙ БОЙ":"НР",
        "СИЛА":"СЛ",
        "ВЫНОСЛИВОСТЬ":"ВН",
        "ЛОВКОСТЬ":"ЛВ",
        "ИНТЕЛЛЕКТ":"ИН",
        "СИЛА ВОЛИ":"СВ",
        "ВОСПРИЯТИЕ":"ВС",
        "ОБЩЕНИЕ":"ОЩ"
    };

    let groups = req.split("|");

    for(let group of groups){

        let ok = true;
        let conditions = group.split(",");

        for(let cond of conditions){

            cond = cond.trim().replace(/\+$/, "");

            if(!cond) continue;

            let m = cond.match(/^(.+?)\s+(\d+)$/i);

            if(m){
                let rawStat = m[1].trim().toUpperCase();
                let stat = STAT_ALIASES[rawStat] || rawStat;
                let need = parseInt(m[2]);

                if(MAIN_STATS.includes(stat)){
                    if((c.stats?.[stat] || 0) < need){
                        ok = false;
                        break;
                    }
                    continue;
                }
            }

            if(!(c.talents || []).includes(cond)){
                ok = false;
                break;
            }
        }

        if(ok) return true;
    }

    return false;
}

 function buyTalent(){

    if(!window.currentCharacter){
        alert("Сначала сгенерируй карточку.");
        return;
    }

    let c = window.currentCharacter;
    let talent = document.getElementById("talentsBuySelect").value;
  let variant =
document.getElementById("talentVariantSelect").value;

if(variant){
    talent = `${talent} (${variant})`;
}

    let baseTalent = talent.replace(/\s*\(.*\)$/,"");
let talentData = DB.talents[baseTalent];

    if(!talentData){
        alert("Талант не найден.");
        return;
    }

    if(!c.talents) c.talents = [];

    if(c.talents.includes(talent)){
        alert("Этот талант уже куплен.");
        return;
    }

    if(!checkTalentRequirements(talentData.requirements, c)){
        alert("Не выполнены требования.");
        return;
    }

    let tier = parseInt(talentData.tier || 1);

    let cost = 250;

    if(tier === 2) cost = 500;
    else if(tier === 3) cost = 750;

    let availableXp = c.startingXp + c.xpRefund - c.spentXp;

    if(availableXp < cost){
        alert(`Не хватает опыта. Нужно ${cost}, доступно ${availableXp}.`);
        return;
    }

    c.talents.push(talent);
    c.spentXp += cost;

    out(card(c));
 }
 
function validateStats(){
 const mode=document.getElementById("statMode").value;
 if(mode!=="planned")return true;

 const spent=spentPoints();
 if(spent>currentPoints){
  alert(`Превышен лимит очков: ${spent} из ${currentPoints}.`);
  return false;
 }

 for(const s of MAIN_STATS){
  if((statAdds[s]||0)<0){
   alert(`В ${s} нельзя вложить отрицательное значение.`);
   return false;
  }
  if((statAdds[s]||0)>currentMaxAdd){
   alert(`В ${s} вложено больше ${currentMaxAdd}.`);
   return false;
  }
 }
 return true;
}

function parseSkill(raw){
 let m=raw.trim().match(/^(.*?)(?:\s+([+-]\d+))?$/);
 return {name:(m?m[1]:raw).trim(),value:m&&m[2]?parseInt(m[2],10):0};
}

function normalizeSkillName(name){
  return name
    .replace(/^Общее знание\s*\(/, "Общие знания (")
    .replace(/^Общие знание\s*\(/, "Общие знания (")
    .replace(/^Общие знания\s*\(/, "Общие знания (")
    .replace(/^Учёное знание\s*\(/, "Учёные знания (")
    .replace(/^Учёные знания\s*\(/, "Учёные знания (")
    .trim();
}
function expandSkill(raw){
  let p = parseSkill(raw);
  let name = normalizeSkillName(p.name);
  let value = p.value;

  let m = name.match(/^(.+?)\s*\((.+)\)$/);
  if (!m) return [{name, value}];

  let base = m[1].trim();
  let inside = m[2].trim();

  if (!inside.includes(",")) {
  return [{name, value}];
}

let parts = inside
  .split(",")
  .map(x => x.trim())
  .filter(Boolean);

return parts.map(x => ({
  name: `${base} (${x})`,
  value
}));
}

function addOneSkill(c, name, value){
  if (!(name in c.skills)) {
    c.skills[name] = value;
  } else {
    c.skills[name] += value ? value : 5;
  }
}

function addSkills(c, arr){
  for (const raw of arr) {
    for (const skill of expandSkill(raw)) {
      if (!skill.name) continue;
      addOneSkill(c, skill.name, skill.value);
    }
  }
}

function addTalents(c,arr){
 for(const raw of arr){
  let n=raw.trim();
  if(!n)continue;
  let rep=String((DB.talents[n]||{}).repeatable||"false").toLowerCase()=="true";
  if(rep||!c.talents.includes(n))c.talents.push(n);
  else c.xpRefund+=25;
 }
}

function addUnique(a,arr){
 for(const x of arr){
  if(x&&!a.includes(x))a.push(x);
 }
}

function applyBlock(c,b){
 let mods=parseMods(b.stat_modifiers);
 for(const s of MAIN_STATS)c.stats[s]+=mods[s]||0;
 c.size+=intv(b.size,0);
 c.woundBonus+=intv(b.wound_bonus,0);
 addSkills(c,splitList(b.skills||b.starting_skills));
 addTalents(c,splitList(b.talents||b.starting_talents));
 addUnique(c.traits,splitList(b.traits));
 addUnique(c.equipment,splitList(b.equipment||b.starting_equipment));
}

function generate(){
 if(!validateStats())return;

 let tn=document.getElementById("templateSelect").value;
 let t=DB.templates[tn]||{};
 let syn=(t.type||"").toLowerCase()=="synthetic"||tn.toLowerCase()=="искин";
 let on=document.getElementById("originSelect").value;
 let sn=document.getElementById("specialtySelect").value;

 let c={
  name:document.getElementById("charName").value.trim()||"Безымянный",
  templateName:tn,
  originName:on,
  specialtyName:sn,
  stats:{...finalStats},
  size:intv(t.size,0),
  woundBonus:intv(t.wound_bonus,0),
  armor:document.getElementById("armor").value.trim()||"0/0/0/0",
  madness:document.getElementById("madness").value.trim()||"0",
  fate:document.getElementById("fate").value.trim()||"0",
  skills:{},
  talents:[],
  traits:[],
  implants:splitList(document.getElementById("implants").value),
  equipment:splitList(document.getElementById("manualEquipment").value),
  notes:document.getElementById("notes").value.trim(),
  startingXp:750,
xpRefund:0,
spentXp:0,
statUpgrades:{}
 };
 
 addSkills(c,splitList(t.skills||t.starting_skills));
 addTalents(c,splitList(t.talents||t.starting_talents));
 addUnique(c.traits,splitList(t.traits));
 addUnique(c.equipment,splitList(t.equipment||t.starting_equipment));

 applyBlock(c,(syn?DB.aiNatures:DB.homeworlds)[on]||{});

if (c.traits.some(x => x.includes("Быстрое обучение"))) {
    c.startingXp = c.startingXp * 1.25;
}

let sp=DB.specialties[sn]||{};
c.spentXp+=intv(sp.cost,0);
applyBlock(c,sp);
window.currentCharacter = c;
out(card(c));
renderUpgradeStats();
document.getElementById("status").innerHTML='<span class="ok">Карточка создана.</span>';
}

function card(c){
 let b={};
 for(const s of MAIN_STATS)b[BONUS_NAMES[s]]=Math.floor((c.stats[s]||0)/10);

 let bm=b.БЛВ+c.size;
 let wounds=c.woundBonus+(b.БВН+b.БСВ)*2;
 let xp=c.startingXp+c.xpRefund-c.spentXp;

 let L=[];
 L.push("====================================",c.name.toUpperCase(),"====================================","");
 L.push(`Раса: ${c.templateName}`);
 L.push(`Родной мир / Природа Искина: ${c.originName}`);
 L.push(`Специальность: ${c.specialtyName}`);
 L.push("","ХАРАКТЕРИСТИКИ");

 for(const s of MAIN_STATS)L.push(`${s}: ${c.stats[s]} (${BONUS_NAMES[s]} ${b[BONUS_NAMES[s]]})`);

 L.push("");
L.push("УЛУЧШЕНИЯ ХАРАКТЕРИСТИК");

for(const s of MAIN_STATS){
  let up = c.statUpgrades[s] || 0;
  if(up>0){
    L.push(`${s}: улучшено ${up} раз`);
  }
}

 L.push("","ПРОИЗВОДНЫЕ");
 L.push(`Движение: ${bm}/${bm*2}/${bm*3}/${bm*6}`);
 L.push(`ОБ: ${c.armor}`);
 L.push(`БВ: ${b.БВН}`);
 L.push(`Раны: ${wounds}`);
 L.push(`Очки безумия: ${c.madness}`);
 L.push(`Очки судьбы: ${c.fate}`);

 L.push("","ОПЫТ");
 L.push(`Стартовый опыт: ${c.startingXp}`);
 L.push(`Компенсация за дубли талантов: ${c.xpRefund}`);
 L.push(`Потрачено: ${c.spentXp}`);
 L.push(`Остаток: ${xp}`);

 L.push("","НАВЫКИ");
 let normalizedSkills = {};

for (const [rawName, value] of Object.entries(c.skills)) {
  let name = rawName
    .replace(/^Общее знание\s*\(/, "Общие знания (")
    .replace(/^Учёное знание\s*\(/, "Учёные знания (");

  if (!(name in normalizedSkills)) {
    normalizedSkills[name] = value;
  } else {
    normalizedSkills[name] += value ? value : 5;
  }
}

let sk = Object.keys(normalizedSkills).sort();

L.push(...(sk.length ? sk.map(n => {
  let bonus = normalizedSkills[n];
  return bonus ? `- ${n} (+${bonus})` : `- ${n}`;
}) : ["-"]));

 L.push("","ТАЛАНТЫ");
 L.push(...(c.talents.length?c.talents.map(x=>"- "+x):["-"]));

 L.push("","ОСОБЕННОСТИ");
 L.push(...(c.traits.length?c.traits.map(x=>"- "+x):["-"]));

 L.push("","ИМПЛАНТЫ");
 L.push(...(c.implants.length?c.implants.map(x=>"- "+x):["-"]));

 L.push("","СНАРЯЖЕНИЕ");
 L.push(...(c.equipment.length?c.equipment.map(x=>"- "+x):["-"]));

 if(c.notes)L.push("","ПРИМЕЧАНИЕ",c.notes);
 return L.join("\n");
}

function out(t){
 document.getElementById("output").textContent=t;
}

function safeFileName(name){
 return String(name || "character")
  .replace(/[\\/:*?"<>|]+/g,"_")
  .replace(/\s+/g,"_")
  .slice(0,60) || "character";
}

function downloadCard(){
 let text=document.getElementById("output").textContent;
 let blob=new Blob([text],{type:"text/plain;charset=utf-8"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="character_card.txt";
 a.click();
 URL.revokeObjectURL(a.href);
}

function getNormalizedSkills(c){
 let normalizedSkills = {};
 for (const [rawName, value] of Object.entries(c.skills || {})) {
  let name = rawName
   .replace(/^Общее знание\s*\(/, "Общие знания (")
   .replace(/^Учёное знание\s*\(/, "Учёные знания (");
  if (!(name in normalizedSkills)) normalizedSkills[name] = value;
  else normalizedSkills[name] += value ? value : 5;
 }
 return Object.keys(normalizedSkills).sort().map(n => {
  let bonus = normalizedSkills[n];
  return bonus ? `${n} (+${bonus})` : n;
 });
}


async function downloadExcelStyled(){
 if(!window.currentCharacter){
  alert("Сначала сгенерируй карточку.");
  return;
 }
 if(typeof ExcelJS === "undefined"){
  alert("Библиотека ExcelJS не загрузилась. Проверь интернет и обнови страницу.");
  return;
 }

 const c = window.currentCharacter;
 const wb = new ExcelJS.Workbook();
 wb.creator = "Helheim Character Generator";
 wb.created = new Date();
 wb.modified = new Date();

 const ws = wb.addWorksheet("Персонаж", {
  views: [{showGridLines:false}],
  pageSetup: {
   orientation:"portrait",
   fitToPage:true,
   fitToWidth:1,
   fitToHeight:0,
   margins:{left:0.15,right:0.15,top:0.15,bottom:0.15,header:0,footer:0}
  }
 });

 const BLACK = "FF000000";
 const WHITE = "FFFFFFFF";
 const GREY = "FFBFBFBF";
 const thinWhite = {style:"thin", color:{argb:WHITE}};
 const mediumWhite = {style:"medium", color:{argb:WHITE}};
 const fillBlack = {type:"pattern", pattern:"solid", fgColor:{argb:BLACK}};

 ws.columns = [
  {key:"a", width:16},
  {key:"b", width:18},
  {key:"c", width:34},
  {key:"d", width:2},
  {key:"e", width:2},
  {key:"f", width:2},
  {key:"g", width:2},
  {key:"h", width:2},
  {key:"i", width:2},
  {key:"j", width:2},
  {key:"k", width:2},
  {key:"l", width:2},
  {key:"m", width:2},
  {key:"n", width:2},
  {key:"o", width:2},
  {key:"p", width:2},
  {key:"q", width:2},
  {key:"r", width:2},
  {key:"s", width:2},
  {key:"t", width:2},
  {key:"u", width:2},
  {key:"v", width:2},
  {key:"w", width:2},
  {key:"x", width:2},
  {key:"y", width:2},
  {key:"z", width:2}
 ];

 for(let cc=4; cc<=26; cc++) ws.getColumn(cc).hidden = true;

 function cell(r,cnum){ return ws.getCell(r,cnum); }
 function merge(range){ try{ ws.mergeCells(range); }catch(e){} }
 function baseStyle(cellObj, bold=false, size=10){
  cellObj.fill = fillBlack;
  cellObj.font = {name:"Arial", size, bold, color:{argb:WHITE}};
  cellObj.alignment = {vertical:"middle", horizontal:"center", wrapText:true};
  cellObj.border = {top:thinWhite,left:thinWhite,bottom:thinWhite,right:thinWhite};
 }
 function styleRange(r1,c1,r2,c2,bold=false,size=10){
  for(let rr=r1; rr<=r2; rr++){
   for(let cc=c1; cc<=c2; cc++) baseStyle(cell(rr,cc), bold, size);
  }
 }
 function outerBorder(r1,c1,r2,c2){
  for(let cc=c1; cc<=c2; cc++){
   cell(r1,cc).border = {...cell(r1,cc).border, top:mediumWhite};
   cell(r2,cc).border = {...cell(r2,cc).border, bottom:mediumWhite};
  }
  for(let rr=r1; rr<=r2; rr++){
   cell(rr,c1).border = {...cell(rr,c1).border, left:mediumWhite};
   cell(rr,c2).border = {...cell(rr,c2).border, right:mediumWhite};
  }
 }
 function safe(v){ return (v===undefined || v===null || v==="") ? "-" : String(v); }
 function oneLineList(arr){ return (arr && arr.length) ? arr.join(", ") : "-"; }
 function multiList(arr){ return (arr && arr.length) ? arr.join("\n") : "-"; }
 function normalizeSkillsForExcel(c){
  let normalizedSkills = {};
  for (const [rawName, value] of Object.entries(c.skills || {})) {
   let name = rawName
    .replace(/^Общее знание\s*\(/, "Общие знания (")
    .replace(/^Учёное знание\s*\(/, "Учёные знания (");
   if (!(name in normalizedSkills)) normalizedSkills[name] = value;
   else normalizedSkills[name] += value ? value : 5;
  }
  return Object.keys(normalizedSkills).sort().map(n => {
   let bonus = normalizedSkills[n];
   return bonus ? `${n} (+${bonus})` : n;
  });
 }

 for(let rr=1; rr<=60; rr++){
  ws.getRow(rr).height = 20;
  for(let cc=1; cc<=26; cc++) baseStyle(cell(rr,cc), false, 10);
 }

 let b={};
 for(const s of MAIN_STATS) b[BONUS_NAMES[s]] = Math.floor((c.stats?.[s] || 0) / 10);
 let bm = (b.БЛВ || 0) + (c.size || 0);
 let wounds = (c.woundBonus || 0) + ((b.БВН || 0) + (b.БСВ || 0)) * 2;
 let xp = (c.startingXp || 0) + (c.xpRefund || 0) - (c.spentXp || 0);

 // Верх карточки как в образце: строка инструкции, пустой разделитель, имя, описание.
 ws.getCell("A1").value = "Заполнение профиля допускается только на русском языке, все таланты и умения должны иметь названия из листов таблицы";
 merge("A1:C1");
 styleRange(1,1,1,3,true,9);
 ws.getRow(1).height = 20;
 outerBorder(1,1,1,3);

 merge("A2:C2");
 styleRange(2,1,2,3,false,10);
 ws.getRow(2).height = 14;
 outerBorder(2,1,2,3);

 ws.getCell("A3").value = safe(c.name || "Безымянный");
 merge("A3:C3");
 styleRange(3,1,3,3,true,12);
 ws.getRow(3).height = 24;
 outerBorder(3,1,3,3);

 let desc = `${safe(c.templateName)}; ${safe(c.originName)}\n${safe(c.specialtyName)}`;
 if(c.notes) desc += `\n${c.notes}`;
 ws.getCell("A4").value = desc;
 merge("A4:C4");
 styleRange(4,1,4,3,true,10);
 ws.getRow(4).height = 62;
 outerBorder(4,1,4,3);

 function statRow(row, label, value){
  ws.getCell(`A${row}`).value = label;
  ws.getCell(`B${row}`).value = value;
  styleRange(row,1,row,2,true,10);
  ws.getRow(row).height = 22;
 }

 let r = 5;
 for(const s of MAIN_STATS) statRow(r++, s, c.stats?.[s] ?? "");
 statRow(r++, "Опыт", xp);
 statRow(r++, "Движение", `${bm}/${bm*2}/${bm*3}/${bm*6}`);
 statRow(r++, "ОБ", safe(c.armor || "0/0/0/0"));
 statRow(r++, "БВ", b.БВН || 0);
 statRow(r++, "Раны", wounds);
 statRow(r++, "Очки безумия", safe(c.madness || 0));
 statRow(r++, "Очки судьбы", safe(c.fate || 0));

 ws.getCell("C5").value = "Место для изображения";
 merge(`C5:C${r-1}`);
 styleRange(5,3,r-1,3,false,10);
 ws.getCell("C5").font = {name:"Arial", size:10, italic:true, color:{argb:GREY}};
 ws.getCell("C5").alignment = {vertical:"middle", horizontal:"center", wrapText:true};
 outerBorder(5,1,r-1,3);

 function section(label, text, startRow, heightRows, fontSize=10){
  let endRow = startRow + heightRows - 1;
  ws.getCell(`A${startRow}`).value = label;
  ws.getCell(`B${startRow}`).value = text || "-";
  merge(`A${startRow}:A${endRow}`);
  merge(`B${startRow}:C${endRow}`);
  styleRange(startRow,1,endRow,3,false,fontSize);
  ws.getCell(`A${startRow}`).font = {name:"Arial", size:10, bold:true, color:{argb:WHITE}};
  ws.getCell(`B${startRow}`).alignment = {vertical:"middle", horizontal:"center", wrapText:true};
  outerBorder(startRow,1,endRow,3);
  for(let i=startRow; i<=endRow; i++) ws.getRow(i).height = 30;
 }

 section("Навыки:", multiList(normalizeSkillsForExcel(c)), 21, 10, 9);
 merge("A31:C31");
 styleRange(31,1,31,3,false,10);
 ws.getRow(31).height = 16;
 section("Таланты:", multiList((c.talents || []).slice()), 32, 7, 9);
 section("Особенности:", oneLineList((c.traits || []).slice()), 39, 2, 9);
 section("Импланты:", multiList((c.implants || []).slice()), 41, 2, 9);
 section("Снаряжение:", multiList((c.equipment || []).slice()), 43, 9, 9);

 // На случай, если приложение показывает дальние колонки, заливаем и их чёрным.
 for(let rr=1; rr<=60; rr++){
  for(let cc=4; cc<=26; cc++){
   const x = cell(rr,cc);
   x.fill = fillBlack;
   x.font = {name:"Arial", size:9, color:{argb:WHITE}};
   x.border = {top:thinWhite,left:thinWhite,bottom:thinWhite,right:thinWhite};
  }
 }

 const buffer = await wb.xlsx.writeBuffer();
 const blob = new Blob([buffer], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
 const a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = safeFileName(c.name) + "_card.xlsx";
 a.click();
 URL.revokeObjectURL(a.href);
}


loadDB();
</script>
</body>
