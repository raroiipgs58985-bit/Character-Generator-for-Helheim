<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helheim Character Generator</title>
<style>
body{margin:0;background:#101114;color:#e8e8e8;font-family:system-ui;padding:14px}
.wrap{max-width:1100px;margin:auto}.grid{display:grid;gap:12px}@media(min-width:900px){.grid{grid-template-columns:420px 1fr}}
.card{background:#181a20;border:1px solid #343844;border-radius:12px;padding:12px}
h1{font-size:22px}h2{font-size:18px;color:#d7a17a}
label{display:block;margin:10px 0 5px;color:#aaa;font-size:14px}
input,select,textarea,button{width:100%;border-radius:8px;border:1px solid #343844;background:#20232b;color:#e8e8e8;padding:9px;font-size:15px}
button{background:#d7a17a;color:#160d08;font-weight:700;border:none;margin-top:10px}.secondary{background:#20232b;color:#e8e8e8;border:1px solid #343844}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:#111319;border:1px solid #343844;border-radius:10px;padding:7px}
.stat-title{font-size:13px;color:#aaa;margin-bottom:5px}
.stat-value{text-align:center;font-size:20px;font-weight:700;margin:5px 0}
.stat-buttons{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.stat-buttons button{margin:0;padding:5px}
.small{color:#aaa;font-size:13px;line-height:1.35}.ok{color:#8cff9b;font-weight:700}.bad{color:#ff7777;font-weight:700}
pre{white-space:pre-wrap;word-wrap:break-word;background:#0b0c0f;border:1px solid #343844;border-radius:12px;padding:12px;min-height:420px;font-size:14px;line-height:1.4}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="wrap">
<h1>Helheim Character Generator</h1>
<div class="grid">
<div class="card">
<h2>Создание персонажа</h2>

<label>Имя</label>
<input id="charName" placeholder="Имя персонажа">

<label>Раса / шаблон</label>
<select id="templateSelect"></select>

<div class="row">
<div>
<label>Распределение</label>
<select id="statMode">
<option value="planned">Плановое</option>
<option value="random">Случайное 2к10</option>
</select>
</div>
<div>
<label>ОБ вручную</label>
<input id="armor" value="0/0/0/0">
</div>
</div>

<button onclick="prepareStats()">Подготовить характеристики</button>
<p id="pointsInfo" class="small"></p>
<div id="statsBox" class="stats"></div>

 <h3>Покупка характеристик</h3>
<div class="stats">
  <button onclick="buyStatUpgrade('НС')">НС +5</button>
  <button onclick="buyStatUpgrade('НР')">НР +5</button>
  <button onclick="buyStatUpgrade('СЛ')">СЛ +5</button>
  <button onclick="buyStatUpgrade('ВН')">ВН +5</button>
  <button onclick="buyStatUpgrade('ЛВ')">ЛВ +5</button>
  <button onclick="buyStatUpgrade('ИН')">ИН +5</button>
  <button onclick="buyStatUpgrade('СВ')">СВ +5</button>
  <button onclick="buyStatUpgrade('ВС')">ВС +5</button>
  <button onclick="buyStatUpgrade('ОЩ')">ОЩ +5</button>
</div>

<label>Родной мир / природа Искина</label>
<select id="originSelect"></select>

<label>Специальность</label>
<select id="specialtySelect"></select>

<div class="row">
<div><label>Очки безумия</label><input id="madness" value="0"></div>
<div><label>Очки судьбы</label><input id="fate" value="0"></div>
</div>

<label>Импланты</label>
<textarea id="implants" rows="2" placeholder="Через ;"></textarea>

<label>Снаряжение вручную</label>
<textarea id="manualEquipment" rows="3" placeholder="Через ;"></textarea>

<label>Примечание</label>
<textarea id="notes" rows="2"></textarea>

<button onclick="generate()">Сгенерировать карточку</button>
<button class="secondary" onclick="downloadCard()">Скачать карточку txt</button>
<p id="status" class="small"></p>
</div>

<div class="card">
<h2>Итоговая карточка</h2>
<pre id="output">Загрузка базы...</pre>
</div>
</div>
</div>

<script>
const MAIN_STATS=["НС","НР","СЛ","ВН","ЛВ","ИН","СВ","ВС","ОЩ"];
const BONUS_NAMES={НС:"БНС",НР:"БНР",СЛ:"БСЛ",ВН:"БВН",ЛВ:"БЛВ",ИН:"БИН",СВ:"БСВ",ВС:"БВС",ОЩ:"БОЩ"};

const DB_FILES={
 templates:"data/templates.txt",
 homeworlds:"data/homeworlds.txt",
 aiNatures:"data/ai_natures.txt",
 talents:"data/talents.txt",
 soldiers:"data/specialties_soldiers.txt",
 officerSupport:"data/specialties_officer_support.txt",
 civilian:"data/specialties_civilian.txt"
};

let DB={};
let baseStats={};
let statAdds={};
let finalStats={};
let currentPoints=100;
let currentMaxAdd=20;

function joinSemi(a,b){return a?a+"; "+b:b}
function intv(v,d=0){let m=String(v??"").match(/-?\d+/);return m?parseInt(m[0],10):d}
function splitList(t){return t?t.split(";").map(x=>x.trim()).filter(Boolean):[]}

function parseBlocks(text){
 let blocks={},current=null,currentKey=null;
 for(let raw of text.split(/\r?\n/)){
  let line=raw.trim();
  if(!line||line.startsWith("#"))continue;
  if(line.startsWith("[")&&line.endsWith("]")){
   current=line.slice(1,-1).trim();
   blocks[current]={};
   currentKey=null;
   continue;
  }
  if(!current)continue;
  if(line.endsWith(":")){
   currentKey=line.slice(0,-1).trim();
   blocks[current][currentKey]="";
   continue;
  }
  if(line.startsWith("-")&&currentKey){
   blocks[current][currentKey]=joinSemi(blocks[current][currentKey],line.slice(1).trim());
   continue;
  }
  if(line.includes("=")){
   let i=line.indexOf("="),key=line.slice(0,i).trim(),value=line.slice(i+1).trim();
   if(currentKey&&MAIN_STATS.includes(key)){
    blocks[current][currentKey]=joinSemi(blocks[current][currentKey],key+"="+value);
   }else{
    blocks[current][key]=value;
    currentKey=null;
   }
  }
 }
 return blocks;
}

async function loadText(path){
 let r=await fetch(path);
 if(!r.ok)throw new Error("Не удалось загрузить "+path);
 return await r.text();
}

async function loadDB(){
  try{
    for(const [k,p] of Object.entries(DB_FILES)){
      out("Загружаю файл: " + p);
      DB[k]=parseBlocks(await loadText(p));
    }

    out("Файлы загружены. Собираю базу...");

    DB.specialties={...DB.soldiers,...DB.officerSupport,...DB.civilian};
    fillSelect("templateSelect",Object.keys(DB.templates));
    fillSelect("specialtySelect",Object.keys(DB.specialties));
    updateOrigins();
    prepareStats();

    out("База загружена. Выбери параметры и нажми «Сгенерировать карточку».");
  }catch(e){
    out("ОШИБКА ЗАГРУЗКИ БАЗЫ:\n" + e.message);
  }
}

function fillSelect(id,names){
 let s=document.getElementById(id);
 s.innerHTML="";
 for(const n of names){
  let o=document.createElement("option");
  o.value=n;
  o.textContent=n;
  s.appendChild(o);
 }
}

function parseBaseStats(b){
 let st={};
 for(const s of MAIN_STATS)st[s]=0;
 if(b.base_stats){
  for(const p of splitList(b.base_stats)){
   let m=p.match(/^(НС|НР|СЛ|ВН|ЛВ|ИН|СВ|ВС|ОЩ)\s*=?\s*(-?\d+)/);
   if(m)st[m[1]]=parseInt(m[2],10);
  }
 }
 for(const s of MAIN_STATS){
  if(b[s]!==undefined)st[s]=intv(b[s],0);
 }
 return st;
}

function parseMods(t){
 let m={};
 for(const s of MAIN_STATS)m[s]=0;
 for(const p of splitList(t)){
  let r=p.match(/^(НС|НР|СЛ|ВН|ЛВ|ИН|СВ|ВС|ОЩ)\s*([+-]?\d+)/);
  if(r)m[r[1]]+=parseInt(r[2],10);
 }
 return m;
}

function updateOrigins(){
 let n=document.getElementById("templateSelect").value;
 let t=DB.templates[n]||{};
 let syn=(t.type||"").toLowerCase()=="synthetic"||n.toLowerCase()=="искин";
 fillSelect("originSelect",Object.keys(syn?DB.aiNatures:DB.homeworlds));
}

document.getElementById("templateSelect").addEventListener("change",()=>{updateOrigins();prepareStats()});
document.getElementById("statMode").addEventListener("change",prepareStats);

function roll2d10(){
 return 1+Math.floor(Math.random()*10)+1+Math.floor(Math.random()*10);
}

function prepareStats(){
 let n=document.getElementById("templateSelect").value;
 let t=DB.templates[n]||{};
 let mode=document.getElementById("statMode").value;

 baseStats=parseBaseStats(t);
 currentPoints=intv(t.stat_points_planned,100);
 currentMaxAdd=intv(t.stat_max_add,20);
 statAdds={};
 finalStats={};

 for(const s of MAIN_STATS){
  statAdds[s]=0;
  finalStats[s]=baseStats[s]||0;
 }

 if(mode==="random"){
  for(const s of MAIN_STATS){
   finalStats[s]=(baseStats[s]||0)+roll2d10();
  }
 }

 renderStats();
}

function spentPoints(){
 let sum=0;
 for(const s of MAIN_STATS)sum+=statAdds[s]||0;
 return sum;
}

function renderStats(){
 const mode=document.getElementById("statMode").value;
 const spent=spentPoints();
 const left=currentPoints-spent;
 const info=document.getElementById("pointsInfo");

 if(mode==="planned"){
  info.innerHTML=`Доступно очков: ${currentPoints}. Осталось: <b>${left}</b>. Максимум в одну характеристику: ${currentMaxAdd}.`;
 }else{
  info.textContent="Случайный режим: к базе добавлено 2к10. Ручное изменение отключено.";
 }

 let box=document.getElementById("statsBox");
 box.innerHTML="";

 for(const s of MAIN_STATS){
  let canEdit=mode==="planned";
  let d=document.createElement("div");
  d.className="stat";

  d.innerHTML=`
   <div class="stat-title">${s} база ${baseStats[s]||0} ${canEdit?`(+${statAdds[s]||0})`:""}</div>
   <div class="stat-value" id="val_${s}">${finalStats[s]||0}</div>
   ${canEdit?`
   <div class="stat-buttons">
    <button type="button" onclick="changeStat('${s}',-1)">−</button>
    <button type="button" onclick="changeStat('${s}',1)">+</button>
   </div>`:""}
  `;
  box.appendChild(d);
 }
}

function changeStat(stat,delta){
 if(delta>0){
  if(spentPoints()>=currentPoints){
   alert("Все очки уже распределены.");
   return;
  }
  if((statAdds[stat]||0)>=currentMaxAdd){
   alert(`В ${stat} нельзя вложить больше ${currentMaxAdd} очков.`);
   return;
  }
  statAdds[stat]=(statAdds[stat]||0)+1;
  finalStats[stat]=(finalStats[stat]||0)+1;
 }else{
  if((statAdds[stat]||0)<=0)return;
  statAdds[stat]-=1;
  finalStats[stat]-=1;
 }
 renderStats();
}
function buyStatUpgrade(stat){
  if(!window.currentCharacter){
    alert("Сначала сгенерируй карточку.");
    return;
  }

  let c = window.currentCharacter;

  if(!c.statUpgrades[stat]) c.statUpgrades[stat]=0;

  let count = c.statUpgrades[stat];

  let cost = 0;

  if(count===0) cost=250;
  else if(count===1) cost=500;
  else if(count===2) cost=750;
  else cost=1000;
 let availableXp = c.startingXp + c.xpRefund - c.spentXp;
if(availableXp < cost){
  alert(`Не хватает опыта. Нужно ${cost}, доступно ${availableXp}.`);
  return;
}
  c.stats[stat] += 5;
  c.statUpgrades[stat] += 1;
  c.spentXp += cost;

  out(card(c));
}
 
function validateStats(){
 const mode=document.getElementById("statMode").value;
 if(mode!=="planned")return true;

 const spent=spentPoints();
 if(spent>currentPoints){
  alert(`Превышен лимит очков: ${spent} из ${currentPoints}.`);
  return false;
 }

 for(const s of MAIN_STATS){
  if((statAdds[s]||0)<0){
   alert(`В ${s} нельзя вложить отрицательное значение.`);
   return false;
  }
  if((statAdds[s]||0)>currentMaxAdd){
   alert(`В ${s} вложено больше ${currentMaxAdd}.`);
   return false;
  }
 }
 return true;
}

function parseSkill(raw){
 let m=raw.trim().match(/^(.*?)(?:\s+([+-]\d+))?$/);
 return {name:(m?m[1]:raw).trim(),value:m&&m[2]?parseInt(m[2],10):0};
}

function normalizeSkillName(name){
  return name
    .replace(/^Общее знание\s*\(/, "Общие знания (")
    .replace(/^Общие знание\s*\(/, "Общие знания (")
    .replace(/^Общие знания\s*\(/, "Общие знания (")
    .replace(/^Учёное знание\s*\(/, "Учёные знания (")
    .replace(/^Учёные знания\s*\(/, "Учёные знания (")
    .trim();
}
function expandSkill(raw){
  let p = parseSkill(raw);
  let name = normalizeSkillName(p.name);
  let value = p.value;

  let m = name.match(/^(.+?)\s*\((.+)\)$/);
  if (!m) return [{name, value}];

  let base = m[1].trim();
  let inside = m[2].trim();

  if (!inside.includes(",")) {
  return [{name, value}];
}

let parts = inside
  .split(",")
  .map(x => x.trim())
  .filter(Boolean);

return parts.map(x => ({
  name: `${base} (${x})`,
  value
}));
}

function addOneSkill(c, name, value){
  if (!(name in c.skills)) {
    c.skills[name] = value;
  } else {
    c.skills[name] += value ? value : 5;
  }
}

function addSkills(c, arr){
  for (const raw of arr) {
    for (const skill of expandSkill(raw)) {
      if (!skill.name) continue;
      addOneSkill(c, skill.name, skill.value);
    }
  }
}

function addTalents(c,arr){
 for(const raw of arr){
  let n=raw.trim();
  if(!n)continue;
  let rep=String((DB.talents[n]||{}).repeatable||"false").toLowerCase()=="true";
  if(rep||!c.talents.includes(n))c.talents.push(n);
  else c.xpRefund+=25;
 }
}

function addUnique(a,arr){
 for(const x of arr){
  if(x&&!a.includes(x))a.push(x);
 }
}

function applyBlock(c,b){
 let mods=parseMods(b.stat_modifiers);
 for(const s of MAIN_STATS)c.stats[s]+=mods[s]||0;
 c.size+=intv(b.size,0);
 c.woundBonus+=intv(b.wound_bonus,0);
 addSkills(c,splitList(b.skills||b.starting_skills));
 addTalents(c,splitList(b.talents||b.starting_talents));
 addUnique(c.traits,splitList(b.traits));
 addUnique(c.equipment,splitList(b.equipment||b.starting_equipment));
}

function generate(){
 if(!validateStats())return;

 let tn=document.getElementById("templateSelect").value;
 let t=DB.templates[tn]||{};
 let syn=(t.type||"").toLowerCase()=="synthetic"||tn.toLowerCase()=="искин";
 let on=document.getElementById("originSelect").value;
 let sn=document.getElementById("specialtySelect").value;

 let c={
  name:document.getElementById("charName").value.trim()||"Безымянный",
  templateName:tn,
  originName:on,
  specialtyName:sn,
  stats:{...finalStats},
  size:intv(t.size,0),
  woundBonus:intv(t.wound_bonus,0),
  armor:document.getElementById("armor").value.trim()||"0/0/0/0",
  madness:document.getElementById("madness").value.trim()||"0",
  fate:document.getElementById("fate").value.trim()||"0",
  skills:{},
  talents:[],
  traits:[],
  implants:splitList(document.getElementById("implants").value),
  equipment:splitList(document.getElementById("manualEquipment").value),
  notes:document.getElementById("notes").value.trim(),
  startingXp:750,
xpRefund:0,
spentXp:0,
statUpgrades:{}

 addSkills(c,splitList(t.skills||t.starting_skills));
 addTalents(c,splitList(t.talents||t.starting_talents));
 addUnique(c.traits,splitList(t.traits));
 addUnique(c.equipment,splitList(t.equipment||t.starting_equipment));

 applyBlock(c,(syn?DB.aiNatures:DB.homeworlds)[on]||{});

if (c.traits.some(x => x.includes("Быстрое обучение"))) {
    c.startingXp = c.startingXp * 1.25;
}

let sp=DB.specialties[sn]||{};
c.spentXp+=intv(sp.cost,0);
applyBlock(c,sp);
 window.currentCharacter = c;
 out(card(c));
 document.getElementById("status").innerHTML='<span class="ok">Карточка создана.</span>';
}

function card(c){
 let b={};
 for(const s of MAIN_STATS)b[BONUS_NAMES[s]]=Math.floor((c.stats[s]||0)/10);

 let bm=b.БЛВ+c.size;
 let wounds=c.woundBonus+(b.БВН+b.БСВ)*2;
 let xp=c.startingXp+c.xpRefund-c.spentXp;

 let L=[];
 L.push("====================================",c.name.toUpperCase(),"====================================","");
 L.push(`Раса: ${c.templateName}`);
 L.push(`Родной мир / Природа Искина: ${c.originName}`);
 L.push(`Специальность: ${c.specialtyName}`);
 L.push("","ХАРАКТЕРИСТИКИ");

 for(const s of MAIN_STATS)L.push(`${s}: ${c.stats[s]} (${BONUS_NAMES[s]} ${b[BONUS_NAMES[s]]})`);

 L.push("");
L.push("УЛУЧШЕНИЯ ХАРАКТЕРИСТИК");

for(const s of MAIN_STATS){
  let up = c.statUpgrades[s] || 0;
  if(up>0){
    L.push(`${s}: улучшено ${up} раз`);
  }
}

 L.push("","ПРОИЗВОДНЫЕ");
 L.push(`Движение: ${bm}/${bm*2}/${bm*3}/${bm*6}`);
 L.push(`ОБ: ${c.armor}`);
 L.push(`БВ: ${b.БВН}`);
 L.push(`Раны: ${wounds}`);
 L.push(`Очки безумия: ${c.madness}`);
 L.push(`Очки судьбы: ${c.fate}`);

 L.push("","ОПЫТ");
 L.push(`Стартовый опыт: ${c.startingXp}`);
 L.push(`Компенсация за дубли талантов: ${c.xpRefund}`);
 L.push(`Потрачено: ${c.spentXp}`);
 L.push(`Остаток: ${xp}`);

 L.push("","НАВЫКИ");
 let normalizedSkills = {};

for (const [rawName, value] of Object.entries(c.skills)) {
  let name = rawName
    .replace(/^Общее знание\s*\(/, "Общие знания (")
    .replace(/^Учёное знание\s*\(/, "Учёные знания (");

  if (!(name in normalizedSkills)) {
    normalizedSkills[name] = value;
  } else {
    normalizedSkills[name] += value ? value : 5;
  }
}

let sk = Object.keys(normalizedSkills).sort();

L.push(...(sk.length ? sk.map(n => {
  let bonus = normalizedSkills[n];
  return bonus ? `- ${n} (+${bonus})` : `- ${n}`;
}) : ["-"]));

 L.push("","ТАЛАНТЫ");
 L.push(...(c.talents.length?c.talents.map(x=>"- "+x):["-"]));

 L.push("","ОСОБЕННОСТИ");
 L.push(...(c.traits.length?c.traits.map(x=>"- "+x):["-"]));

 L.push("","ИМПЛАНТЫ");
 L.push(...(c.implants.length?c.implants.map(x=>"- "+x):["-"]));

 L.push("","СНАРЯЖЕНИЕ");
 L.push(...(c.equipment.length?c.equipment.map(x=>"- "+x):["-"]));

 if(c.notes)L.push("","ПРИМЕЧАНИЕ",c.notes);
 return L.join("\n");
}

function out(t){
 document.getElementById("output").textContent=t;
}

function downloadCard(){
 let text=document.getElementById("output").textContent;
 let blob=new Blob([text],{type:"text/plain;charset=utf-8"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="character_card.txt";
 a.click();
 URL.revokeObjectURL(a.href);
}

loadDB();
</script>
</body>
</html>
